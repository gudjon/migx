# Immutable: once registered, a prefix's meaning never changes and its letters are never reused.
# Enforced by kanban/scripts/verify-prefix-registry.py (Phase 3).
#
# Rules for the 3-letter dossier prefixes: UPPERCASE, exactly 3 letters, unique.

