  - prefix: "AP-"
    kind: antipattern
    home: kanban/patterns/
  - prefix: "ADR-"
    kind: decision
    home: kanban/architecture/decisions/
  - prefix: "PS-"
    kind: problem-statement
    home: "<dossier>/00-FOUNDATION/"
  - prefix: "EVD-"
    kind: evidence
    home: "<dossier>/results/"
  - prefix: "TR-"
    kind: trigger
    home: kanban/triggers/registry.yaml

